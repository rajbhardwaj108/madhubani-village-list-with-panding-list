/* === STORAGE === */
let completed = JSON.parse(localStorage.getItem("pandigVillageDone")) || {};

const taskList = document.getElementById("taskList");
const progress = document.getElementById("progress");

/* === FUNCTIONS === */
function save() {
  localStorage.setItem("pandigVillageDone", JSON.stringify(completed));
}

function updateProgress() {
  const doneCount = Object.values(completed).filter(v => v).length;
  progress.textContent = `Completed ${doneCount} / ${villages.length} villages`;
}

/* === RENDER TASKS === */
villages.forEach((village, index) => {
  const task = document.createElement("div");
  task.className = "task";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.checked = completed[index] || false;

  if (checkbox.checked) task.classList.add("done");

  checkbox.addEventListener("change", () => {
    completed[index] = checkbox.checked;
    task.classList.toggle("done");
    save();
    updateProgress();
  });

  const label = document.createElement("label");
  label.textContent = `${index + 1}. ${village}`;

  task.appendChild(checkbox);
  task.appendChild(label);
  taskList.appendChild(task);
});

updateProgress();
</script>
